<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Motion Link - Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <style>
        body {
            background-color: #050505;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding: 40px;
            overflow: auto;
        }

        .leaderboard-container {
            position: relative;
            width: 800px;
            max-width: 90vw;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 40px rgba(0, 255, 255, 0.05);
            padding: 40px;
            backdrop-filter: blur(8px);
        }

        .leaderboard-title {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            color: #00ffff;
            text-align: center;
            letter-spacing: 8px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
        }

        .leaderboard-subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            color: #888;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffff, #00ffff, transparent);
            margin-bottom: 30px;
            box-shadow: 0 0 10px #00ffff;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            font-family: 'Rajdhani', sans-serif;
        }

        th {
            text-align: left;
            padding: 10px 15px;
            font-size: 1rem;
            color: #00ffff;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            text-transform: uppercase;
        }

        th:last-child {
            text-align: right;
        }

        tr.lb-row {
            background: rgba(0, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        tr.lb-row:hover {
            background: rgba(0, 255, 255, 0.15);
            transform: scale(1.01);
        }

        td {
            padding: 15px;
            font-size: 1.2rem;
            border-top: 1px solid transparent;
            border-bottom: 1px solid transparent;
        }

        tr.lb-row td:first-child {
            border-left: 2px solid #00ffff;
            color: #00ffff;
            font-weight: 700;
            width: 10%;
        }

        tr.lb-row.rank-1 td:first-child {
            border-left-color: #fbbf24;
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        tr.lb-row.rank-2 td:first-child {
            border-left-color: #e2e8f0;
            color: #e2e8f0;
        }

        tr.lb-row.rank-3 td:first-child {
            border-left-color: #d97706;
            color: #d97706;
        }

        tr.lb-row td:last-child {
            text-align: right;
            font-family: 'Orbitron', monospace;
            color: #00ff88;
            letter-spacing: 1px;
            border-right: 1px solid rgba(0, 255, 255, 0.2);
        }

        .lb-name {
            font-weight: 600;
            color: #eee;
            letter-spacing: 1px;
        }

        .lb-class {
            font-size: 0.9rem;
            color: #888;
            margin-top: 4px;
        }

        .status-msg {
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            color: #888;
            font-size: 1.2rem;
            letter-spacing: 2px;
            padding: 40px;
        }
    </style>
</head>

<body>

    <div class="leaderboard-container">
        <span class="corner tl" style="border-color:#00ffff;"></span>
        <span class="corner tr" style="border-color:#00ffff;"></span>
        <span class="corner bl" style="border-color:#00ffff;"></span>
        <span class="corner br" style="border-color:#00ffff;"></span>

        <h1 class="leaderboard-title">HALL OF FAME</h1>
        <p class="leaderboard-subtitle">// TOP OPERATIVES // RUN TIMES //</p>

        <div class="divider"></div>

        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Operative</th>
                    <th>Clear Time</th>
                </tr>
            </thead>
            <tbody id="lb-body">
                <tr>
                    <td colspan="3">
                        <div class="status-msg" id="lb-status">CONNECTING TO DATABANKS...</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Standalone Script for connecting and rendering -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"
        integrity="sha384-mZLF4UVrpi/QTWPA7BjNPEnkIfRFn4ZEO3Qt/HFklTJBj/gBOV8G3HcKn4NfQblz"
        crossorigin="anonymous"></script>
    <script src="./assets/js/leaderboard.js" type="module"></script>
</body>

</html>
